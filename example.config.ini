[API]
base_url = https://subdomain.diagho.com/api/v1
identifier = username or mail
password = password

[WATCH]
path = /data/runs

[SAMPLES]
enable_bam_linking = true
retry_delay_minutes = 10
# Number of times to retry finding a sample before skipping the bam (patient
# likely removed from metadata). Skipped bams are logged once linking finishes.
max_link_retries = 3

[HOUSEKEEPING]
backup_path = /data/backup_runs
retention_days = 7